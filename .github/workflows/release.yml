name: PyPI Release

on:
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Stamp version from plugin.json into pyproject.toml
        run: |
          python3 -c "
          import json, re, pathlib
          version = json.loads(pathlib.Path('.claude-plugin/plugin.json').read_text())['version']
          p = pathlib.Path('pyproject.toml')
          p.write_text(re.sub(r'^version = .*', f'version = \"{version}\"', p.read_text(), flags=re.MULTILINE))
          print(f'Stamped version: {version}')
          "

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/temporal-reasoning
    permissions:
      id-token: write

    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
